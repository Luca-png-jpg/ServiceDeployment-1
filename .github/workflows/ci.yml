name: CI - Microservice Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: docker-repository

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Start Services (docker-compose)
        run: docker-compose -f docker-compose.yml up -d

      - name: Wait for DBMS Initialization
        run: sleep 10

      - name: Initialize Database
        run: docker-compose -f docker-compose.yml exec microservice python init_db.py

      - name: Run Tests
        run: docker-compose -f docker-compose.yml exec microservice pytest

      - name: Docker Log-in
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker Build
        run: docker build -t lucapiras/lezione15 .

      - name: Docker Push
        run: docker push lucapiras/lezione15

      - name: Clean-up
        run: docker-compose -f docker-compose.yml down -v